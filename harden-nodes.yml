---
- name: Harden all nodes
  hosts: k3s_nodes
  become: yes
  tasks:
    - name: Install useful packages
      apt:
        name:
          - curl
          - wget
          - git
          - ufw
          - htop
        state: present
        update_cache: yes

    - name: Enable UFW firewall
      ufw:
        state: enabled
        policy: deny

    - name: Allow SSH through firewall
      ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
